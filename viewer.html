<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prins Viewer</title>
  <style>
    :root {
      --blue-dark: #1b5faf;
      --blue-mid: #4fa7e8;
      --blue-light: #e8f5ff;
      --white: #ffffff;
      --text: #154273;
      --shadow: 0 16px 36px rgba(18, 71, 135, 0.15);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #dff1ff 0%, #f6fbff 45%, #cbe7ff 100%);
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      background: rgba(255,255,255,0.9);
      border-bottom: 1px solid rgba(27,95,175,0.12);
      box-shadow: 0 6px 20px rgba(27,95,175,0.08);
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      background: white;
      border-radius: 14px;
      padding: 6px;
      box-shadow: 0 6px 16px rgba(27,95,175,0.12);
      flex-shrink: 0;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      color: var(--blue-dark);
    }

    .title-wrap p {
      margin: 4px 0 0;
      color: #5f82a8;
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease;
    }

    .btn-back {
      background: linear-gradient(135deg, #ffffff, #dff1ff);
      color: var(--blue-dark);
      border: 2px solid rgba(27,95,175,0.12);
    }

    .btn-download {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
      color: var(--white);
      box-shadow: 0 10px 22px rgba(27,95,175,0.18);
    }

    .btn:hover { transform: translateY(-2px); }

    .viewer-shell {
      flex: 1;
      padding: 18px;
    }

    .viewer-card {
      height: calc(100vh - 120px);
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(27,95,175,0.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: white;
    }

    .empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      color: #5f82a8;
      line-height: 1.7;
      font-size: 1rem;
    }

    @media (max-width: 720px) {
      .viewer-shell { padding: 12px; }
      .viewer-card { height: calc(100vh - 160px); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="STD Prins Logo.png" alt="Prins logo" />
      <div class="title-wrap">
        <h1 id="docTitle">Document Viewer</h1>
        <p>Open engineering documents without leaving the portal.</p>
      </div>
    </div>

    <div class="actions">
      <a class="btn btn-back" href="index.html">← Back</a>
      <a class="btn btn-download" id="downloadBtn" href="#">Open PDF</a>
    </div>
  </header>

  <main class="viewer-shell">
    <div class="viewer-card" id="viewerCard">
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const doc = params.get('doc');
    const title = params.get('title') || 'Document Viewer';

    document.getElementById('docTitle').textContent = title;

    const frame = document.getElementById('pdfFrame');
    const downloadBtn = document.getElementById('downloadBtn');
    const viewerCard = document.getElementById('viewerCard');

    if (doc) {
      frame.src = doc;
      downloadBtn.href = doc;
      downloadBtn.setAttribute('target', '_blank');
    } else {
      viewerCard.innerHTML = '<div class="empty">No document was selected.<br />Go back to the home page and choose a file to view.</div>';
      downloadBtn.style.display = 'none';
    }
  </script>
</body>
</html>
